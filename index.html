<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Play Button on Image</title>
<style>
  /* Container utama untuk gambar dan tombol */
  .video-container {
    position: relative;
    width: 100%;
    max-width: 600px; /* Sesuaikan ukuran gambar */
    margin: auto;
    cursor: pointer;
  }

  /* Styling Gambar */
  .video-container img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
  }

  /* Styling Tombol Play (Fake) */
  .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(0, 0, 0, 0.6); /* Transparan hitam */
    color: white;
    padding: 20px;
    border-radius: 50%;
    font-size: 30px;
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid white;
    transition: all 0.3s ease;
  }

  /* Efek Hover (Saat kursor di atas gambar) */
  .video-container:hover .play-button {
    background-color: rgba(255, 0, 0, 0.8); /* Berubah merah saat hover */
    transform: translate(-50%, -50%) scale(1.1);
  }
</style>
</head>
<body>

<div class="video-container">
  <!-- Ganti 'url-gambar.jpg' dengan link gambar Anda -->
  <img src="https://cdn.aceimg.com/6ca9b97c8.png" alt="Video Thumbnail">
  
  <!-- Icon play (bisa menggunakan karakter Unicode atau icon library) -->
  <div class="play-button">▶</div>
</div>

</body>
</html>
