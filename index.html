<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
}

/* Wrapper biar tidak mentok pinggir */
.wrapper {
  width: 100%;
  max-width: 800px; /* desktop */
}

/* Container video */
.video-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9; /* biar tidak penyok */
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

/* Gambar tidak gepeng */
.video-container img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* penting biar proporsional */
}

/* Overlay halus */
.video-container::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.2);
}

/* Tombol play */
.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  background: rgba(255,255,255,0.9);
  color: black;
  font-size: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* Controls bawah */
.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  color: white;
  font-size: 12px;
  z-index: 2;
}

.progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.3);
  margin-bottom: 5px;
  position: relative;
}

.progress::after {
  content: "";
  width: 30%;
  height: 100%;
  background: white;
  position: absolute;
}

.time {
  display: flex;
  justify-content: space-between;
}

/* 📱 Versi HP */
@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  .play-button {
    width: 55px;
    height: 55px;
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <a href="https://blackhub-baddies.github.io/lTg2YGjw1/">
    <div class="video-container">

      <img src="https://cdn.aceimg.com/6ca9b97c8.png">

      <div class="play-button">▶</div>

      <div class="controls">
        <div class="progress"></div>
        <div class="time">
          <span>00:00</span>
          <span>-00:27</span>
        </div>
      </div>

    </div>
  </a>
</div>

</body>
</html>
