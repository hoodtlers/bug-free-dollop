<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black; /* background full hitam */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container portrait */
.video-container {
  position: relative;
  width: 100%;
  max-width: 400px; /* ukuran di HP */
  aspect-ratio: 9/16; /* portrait */
  background: black;
  overflow: hidden;
}

/* Gambar */
.video-container img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* biar pas & tidak gepeng */
}

/* Tombol play tengah */
.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  background: rgba(0, 123, 255, 0.9); /* biru kayak contoh */
  color: white;
  font-size: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Bar bawah */
.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  color: white;
  font-size: 12px;
}

.progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.3);
  margin-bottom: 5px;
  position: relative;
}

.progress::after {
  content: "";
  width: 20%;
  height: 100%;
  background: white;
  position: absolute;
}

/* Time */
.time {
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<a href="https://blackhub-baddies.github.io/lTg2YGjw1/">
  <div class="video-container">

    <img src="https://cdn.aceimg.com/6ca9b97c8.png">

    <div class="play-button">▶</div>

    <div class="controls">
      <div class="progress"></div>
      <div class="time">
        <span>0:00</span>
        <span>2:14</span>
      </div>
    </div>

  </div>
</a>

</body>
</html>
