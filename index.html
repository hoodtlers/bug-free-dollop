<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Frame full layar */
.video-frame {
  position: relative;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Gambar cinematic */
.video-frame img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain; /* 🔥 biar tidak kepotong */
}

/* Overlay gradient bawah (kayak video asli) */
.video-frame::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 30%;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* Tombol play */
.play-button {
  position: absolute;
  width: 75px;
  height: 75px;
  background: rgba(0, 123, 255, 0.9);
  color: white;
  font-size: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Progress bar bawah */
.controls {
  position: absolute;
  bottom: 15px;
  width: 90%;
}

.progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.3);
  position: relative;
}

.progress::after {
  content: "";
  width: 25%;
  height: 100%;
  background: white;
  position: absolute;
}
</style>
</head>

<body>

<a href="https://blackhub-baddies.github.io/lTg2YGjw1/">
  <div class="video-frame">

    <img src="https://cdn.aceimg.com/6ca9b97c8.png">

    <div class="play-button">▶</div>

    <div class="controls">
      <div class="progress"></div>
    </div>

  </div>
</a>

</body>
</html>
