<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Play Button</title>

<style>
.video-container {
  position: relative;
  width: 100%;
  max-width: 600px;
  margin: auto;
  cursor: pointer;
  display: block;
}

/* Gambar */
.video-container img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 10px;
}

/* Overlay gelap (default transparan) */
.video-container::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0); /* awalnya tidak terlihat */
  border-radius: 10px;
  transition: 0.3s;
}

/* Saat hover → jadi gelap */
.video-container:hover::after {
  background-color: rgba(0,0,0,0.4); /* tingkat gelap */
}

/* Tombol play */
.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: rgba(0, 0, 0, 0.6);
  color: white;
  font-size: 30px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid white;
  z-index: 2;
  transition: 0.3s;
}

/* Efek hover tombol */
.video-container:hover .play-button {
  background-color: rgba(255,0,0,0.8);
  transform: translate(-50%, -50%) scale(1.1);
}
</style>
</head>

<body>

<a href="https://blackhub-baddies.github.io/lTg2YGjw1/">
  <div class="video-container">
    <img src="https://cdn.aceimg.com/6ca9b97c8.png" alt="Thumbnail">
    <div class="play-button">▶</div>
  </div>
</a>

</body>
</html>
