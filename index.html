<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding-top: 40px;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
}

/* Container */
.video-container {
  position: relative;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

/* Gambar */
.video-container img {
  width: 100%;
  display: block;
}

/* Overlay gelap halus */
.video-container::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.2);
}

/* Tombol play tengah */
.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  background: rgba(255,255,255,0.85);
  color: black;
  font-size: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* Bar bawah (fake player) */
.controls {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  color: white;
  font-size: 12px;
  z-index: 2;
}

/* Progress bar */
.progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.3);
  margin-bottom: 5px;
  position: relative;
}

.progress::after {
  content: "";
  width: 30%; /* posisi progress */
  height: 100%;
  background: white;
  position: absolute;
  left: 0;
  top: 0;
}

/* Time */
.time {
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<a href="https://blackhub-baddies.github.io/lTg2YGjw1/">
  <div class="video-container">
    
    <img src="https://cdn.aceimg.com/6ca9b97c8.png">

    <div class="play-button">▶</div>

    <div class="controls">
      <div class="progress"></div>
      <div class="time">
        <span>00:00</span>
        <span>-00:27</span>
      </div>
    </div>

  </div>
</a>

</body>
</html>
